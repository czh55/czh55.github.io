<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=2">
  <meta name="theme-color" content="#1a1a2e">
  <title>Daily Hub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      max-width: 640px;
      width: 100%;
      text-align: center;
    }
    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e94560, #f5a623);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      margin: 0 auto 1.5rem;
      box-shadow: 0 8px 32px rgba(233, 69, 96, 0.3);
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #e94560, #f5a623);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      color: #888;
      font-size: 0.95rem;
      margin-bottom: 2.5rem;
    }
    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 1.5rem 1rem;
      text-align: left;
      text-decoration: none;
      color: #ccc;
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .card:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(233, 69, 96, 0.4);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .card-icon {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }
    .card-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #e0e0e0;
      margin-bottom: 0.25rem;
    }
    .card-desc {
      font-size: 0.78rem;
      color: #777;
      line-height: 1.5;
    }
    .blog-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: #888;
      text-decoration: none;
      font-size: 0.85rem;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.3s ease;
    }
    .blog-link:hover {
      color: #e94560;
      border-color: rgba(233, 69, 96, 0.4);
    }
    footer {
      margin-top: 3rem;
      color: #555;
      font-size: 0.75rem;
    }
    @media (max-width: 480px) {
      .cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="avatar">&#x1f4c5;</div>
    <h1>Daily Hub</h1>
    <p class="subtitle">你的每日入口 · 从这里开始</p>

    <div class="cards">
      <a class="card" href="#">
        <div class="card-icon">&#x1f4dd;</div>
        <div class="card-title">今日笔记</div>
        <div class="card-desc">快速记录想法与待办</div>
      </a>
      <a class="card" href="#">
        <div class="card-icon">&#x1f4ca;</div>
        <div class="card-title">数据看板</div>
        <div class="card-desc">追踪你的日常指标</div>
      </a>
      <a class="card" href="#">
        <div class="card-icon">&#x1f4da;</div>
        <div class="card-title">知识库</div>
        <div class="card-desc">搜索与浏览知识笔记</div>
      </a>
      <a class="card" href="#">
        <div class="card-icon">&#x2699;&#xfe0f;</div>
        <div class="card-title">工具集</div>
        <div class="card-desc">常用工具与快捷入口</div>
      </a>
    </div>

    <a class="blog-link" href="/archives/">
      &#x2190; 访问博客归档
    </a>

    <footer>
      &copy; 2026 Zhiheng Chen · powered by GitHub Pages
    </footer>
  </div>
</body>
</html>
